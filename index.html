<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>경쟁사 광고 모니터링</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242736;
    --border: #2e3248;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --active-bg: #16a34a22;
    --active-fg: #4ade80;
    --inactive-bg: #71717a22;
    --inactive-fg: #a1a1aa;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', 'Noto Sans KR', system-ui, sans-serif;
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; }
  header h1 span { color: var(--accent2); }
  #total-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.75rem;
    padding: 2px 10px;
    border-radius: 99px;
  }

  /* ── 필터 바 ── */
  #filter-bar {
    padding: 20px 32px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }

  .tab-group, .status-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .divider {
    width: 1px;
    height: 28px;
    background: var(--border);
  }

  button {
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 0.82rem;
    padding: 6px 14px;
    border-radius: 99px;
    transition: all 0.15s;
  }
  button:hover { border-color: var(--accent2); color: var(--text); }
  button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  button.active-status.active {
    background: var(--active-bg);
    border-color: var(--active-fg);
    color: var(--active-fg);
  }
  button.inactive-status.active {
    background: var(--inactive-bg);
    border-color: var(--inactive-fg);
    color: var(--inactive-fg);
  }

  /* ── 검색 ── */
  #search-wrap {
    margin-left: auto;
  }
  #search {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.85rem;
    padding: 7px 14px;
    border-radius: 99px;
    width: 220px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: var(--accent2); }
  #search::placeholder { color: var(--muted); }

  /* ── 카드 그리드 ── */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding: 24px 32px 48px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: var(--accent2);
    box-shadow: 0 8px 32px #6c63ff22;
  }

  /* 미디어 영역 */
  .card-media {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }
  .card-media img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-media iframe,
  .card-media video {
    width: 100%; height: 100%;
    border: none;
    display: block;
  }
  .card-media .no-media {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    color: var(--muted);
    font-size: 0.8rem;
  }
  .card-media .no-media svg { opacity: 0.3; }
  .snapshot-link {
    position: absolute;
    bottom: 8px; right: 8px;
    background: #00000088;
    color: #fff;
    font-size: 0.72rem;
    padding: 4px 10px;
    border-radius: 99px;
    text-decoration: none;
    backdrop-filter: blur(4px);
    border: 1px solid #ffffff22;
    transition: background 0.15s;
  }
  .snapshot-link:hover { background: var(--accent); }

  /* 카드 바디 */
  .card-body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .brand-name {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--accent2);
    background: #a78bfa18;
    border: 1px solid #a78bfa33;
    padding: 3px 10px;
    border-radius: 99px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 140px;
  }
  .status-badge {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 99px;
    white-space: nowrap;
  }
  .status-badge.active {
    background: var(--active-bg);
    color: var(--active-fg);
    border: 1px solid var(--active-fg);
  }
  .status-badge.inactive {
    background: var(--inactive-bg);
    color: var(--inactive-fg);
    border: 1px solid var(--inactive-fg);
  }

  .ad-body {
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .ad-body.empty { color: var(--muted); font-style: italic; }

  .card-footer {
    display: flex;
    gap: 12px;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: auto;
    flex-wrap: wrap;
  }
  .card-footer span { display: flex; align-items: center; gap: 4px; }

  .platforms {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .platform-tag {
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  /* 빈 상태 */
  #empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  #empty svg { margin-bottom: 16px; opacity: 0.3; }
  #empty p { font-size: 0.95rem; }

  /* 반응형 */
  @media (max-width: 640px) {
    header, #filter-bar, #grid { padding-left: 16px; padding-right: 16px; }
    #search-wrap { margin-left: 0; width: 100%; }
    #search { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>Ad <span>Monitor</span></h1>
  <span id="total-badge">0개 광고</span>
</header>

<div id="filter-bar">
  <div class="tab-group" id="brand-tabs">
    <button class="active" data-brand="all">전체</button>
  </div>
  <div class="divider"></div>
  <div class="status-group">
    <button class="active" data-status="all">전체 상태</button>
    <button class="active-status" data-status="active">집행중</button>
    <button class="inactive-status" data-status="inactive">종료</button>
  </div>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="광고 문구 검색..." />
  </div>
</div>

<div id="grid"></div>

<script>
// ── 데이터 로드 ──────────────────────────────────────
let ALL_ADS = [];
let activeBrand = 'all';
let activeStatus = 'all';
let searchQuery = '';

async function loadData() {
  try {
    const res = await fetch('ads_data.json');
    if (!res.ok) throw new Error(res.status);
    ALL_ADS = await res.json();
  } catch {
    // 파일 없으면 샘플 데이터로 데모
    ALL_ADS = getSampleData();
  }
  buildBrandTabs();
  render();
}

// ── 탭 생성 ─────────────────────────────────────────
function buildBrandTabs() {
  const brands = [...new Set(ALL_ADS.map(a => a.brand).filter(Boolean))];
  const group = document.getElementById('brand-tabs');
  group.innerHTML = '<button class="active" data-brand="all">전체</button>';
  brands.forEach(b => {
    const btn = document.createElement('button');
    btn.dataset.brand = b;
    btn.textContent = b;
    group.appendChild(btn);
  });
  group.addEventListener('click', e => {
    const btn = e.target.closest('[data-brand]');
    if (!btn) return;
    group.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeBrand = btn.dataset.brand;
    render();
  });
}

// ── 필터 ─────────────────────────────────────────────
function filtered() {
  return ALL_ADS.filter(ad => {
    if (activeBrand !== 'all' && ad.brand !== activeBrand) return false;
    if (activeStatus !== 'all' && ad.status !== activeStatus) return false;
    if (searchQuery) {
      const hay = (ad.body || '').toLowerCase();
      if (!hay.includes(searchQuery)) return false;
    }
    return true;
  });
}

// ── 렌더 ─────────────────────────────────────────────
function render() {
  const ads = filtered();
  const grid = document.getElementById('grid');
  document.getElementById('total-badge').textContent = `${ALL_ADS.length}개 광고`;

  if (!ads.length) {
    grid.innerHTML = `
      <div id="empty">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
        <p>조건에 맞는 광고가 없습니다.</p>
      </div>`;
    return;
  }

  grid.innerHTML = ads.map(ad => cardHTML(ad)).join('');
}

// ── 카드 HTML ─────────────────────────────────────────
function cardHTML(ad) {
  const media = mediaHTML(ad);
  const statusClass = ad.status === 'active' ? 'active' : 'inactive';
  const statusLabel = ad.status === 'active' ? '집행중' : '종료';
  const body = ad.body
    ? escHtml(ad.body)
    : '<span class="empty">광고 본문 없음</span>';
  const startDate = formatDate(ad.start_date);
  const endDate = ad.end_date ? formatDate(ad.end_date) : '—';
  const platforms = (ad.platforms || []).map(p =>
    `<span class="platform-tag">${escHtml(p)}</span>`).join('');

  return `
  <div class="card">
    <div class="card-media">
      ${media}
      ${ad.snapshot_url ? `<a class="snapshot-link" href="${escHtml(ad.snapshot_url)}" target="_blank" rel="noopener">광고 보기 ↗</a>` : ''}
    </div>
    <div class="card-body">
      <div class="card-top">
        <span class="brand-name" title="${escHtml(ad.brand || '')}">${escHtml(ad.brand || '알 수 없음')}</span>
        <span class="status-badge ${statusClass}">${statusLabel}</span>
      </div>
      <p class="ad-body">${body}</p>
      ${platforms ? `<div class="platforms">${platforms}</div>` : ''}
      <div class="card-footer">
        <span>
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          시작 ${startDate}
        </span>
        ${ad.end_date ? `<span>종료 ${endDate}</span>` : ''}
      </div>
    </div>
  </div>`;
}

function mediaHTML(ad) {
  if (ad.video_url) {
    return `<video src="${escHtml(ad.video_url)}" controls muted playsinline></video>`;
  }
  if (ad.image_url) {
    return `<img src="${escHtml(ad.image_url)}" alt="광고 소재" loading="lazy"
      onerror="this.parentElement.innerHTML=noMediaHTML()" />`;
  }
  return noMediaHTML();
}

function noMediaHTML() {
  return `<div class="no-media">
    <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <span>소재 없음</span>
  </div>`;
}

// ── 이벤트 ───────────────────────────────────────────
document.querySelector('.status-group').addEventListener('click', e => {
  const btn = e.target.closest('[data-status]');
  if (!btn) return;
  document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeStatus = btn.dataset.status;
  render();
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  render();
});

// ── 유틸 ─────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatDate(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleDateString('ko-KR', {year:'numeric', month:'2-digit', day:'2-digit'});
  } catch { return iso; }
}

// ── 샘플 데이터 (ads_data.json 없을 때) ──────────────
function getSampleData() {
  return [
    {
      ad_id: "sample_001",
      brand: "브랜드A",
      page_name: "브랜드A 공식",
      body: "지금 바로 경험해보세요! 특별 할인가로 만나볼 수 있는 기회를 놓치지 마세요. 오늘 하루만 진행되는 특가 이벤트입니다.",
      start_date: "2026-05-01T00:00:00",
      end_date: null,
      status: "active",
      platforms: ["facebook", "instagram"],
      image_url: "",
      video_url: "",
      snapshot_url: "",
      collected_at: "2026-06-12T00:00:00"
    },
    {
      ad_id: "sample_002",
      brand: "브랜드A",
      page_name: "브랜드A 공식",
      body: "여름 시즌 신제품 출시! 청량한 여름을 함께할 새로운 컬렉션을 소개합니다.",
      start_date: "2026-04-15T00:00:00",
      end_date: "2026-05-31T00:00:00",
      status: "inactive",
      platforms: ["facebook"],
      image_url: "",
      video_url: "",
      snapshot_url: "",
      collected_at: "2026-06-12T00:00:00"
    },
    {
      ad_id: "sample_003",
      brand: "브랜드B",
      page_name: "브랜드B Official",
      body: "브랜드B와 함께하는 특별한 여정. 프리미엄 경험을 지금 시작하세요. 첫 구매 시 20% 할인 쿠폰 제공.",
      start_date: "2026-06-01T00:00:00",
      end_date: null,
      status: "active",
      platforms: ["instagram", "messenger"],
      image_url: "",
      video_url: "",
      snapshot_url: "",
      collected_at: "2026-06-12T00:00:00"
    },
    {
      ad_id: "sample_004",
      brand: "브랜드B",
      page_name: "브랜드B Official",
      body: "限定コラボレーション企画！数量限定でお届けします。お見逃しなく。",
      start_date: "2026-05-20T00:00:00",
      end_date: "2026-06-10T00:00:00",
      status: "inactive",
      platforms: ["facebook", "instagram"],
      image_url: "",
      video_url: "",
      snapshot_url: "",
      collected_at: "2026-06-12T00:00:00"
    }
  ];
}

// ── 시작 ─────────────────────────────────────────────
loadData();
</script>
</body>
</html>
